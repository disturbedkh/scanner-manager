name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller packaging/scanner-manager.spec --noconfirm

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist/ScannerManager.exe).Hash.ToLower()
          "$hash  ScannerManager.exe" | Out-File -Encoding ascii dist/ScannerManager.exe.sha256
          "Hash = $hash"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScannerManager-exe
          path: |
            dist/ScannerManager.exe
            dist/ScannerManager.exe.sha256

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows-exe]
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source + wheel distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-exe
          path: dist

      - name: Extract release notes
        id: notes
        run: |
          python - <<'PY'
          import os, re
          tag = os.environ.get("GITHUB_REF_NAME", "")
          version = tag.lstrip("v")
          body = "See CHANGELOG.md for details.\n"
          try:
              with open("CHANGELOG.md", "r", encoding="utf-8") as f:
                  changelog = f.read()
              # Match the version header (e.g. "## [0.9.0a1] - 2026-04-19")
              # allowing optional date and bracket variants.
              pat = re.compile(
                  rf"^##\s*\[?{re.escape(version)}\]?.*?$(.*?)(?=^##\s*\[|\Z)",
                  re.MULTILINE | re.DOTALL,
              )
              m = pat.search(changelog)
              if m:
                  body = m.group(1).strip() + "\n"
          except OSError:
              pass
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version={version}\n")
              out.write("body<<EOF\n")
              out.write(body)
              out.write("\nEOF\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Scanner Manager ${{ steps.notes.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/ScannerManager.exe
            dist/ScannerManager.exe.sha256
            dist/*.tar.gz
            dist/*.whl
