name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ScannerManager-windows-x64
            binary_src: dist/ScannerManager.exe
            binary_rename: ScannerManager.exe
            asset_ext: .zip
          - os: macos-latest
            artifact_name: ScannerManager-macos
            binary_src: dist/ScannerManager.app
            binary_rename: ScannerManager.app
            asset_ext: .tar.gz
          - os: ubuntu-latest
            artifact_name: ScannerManager-linux-x64
            binary_src: dist/ScannerManager
            binary_rename: ScannerManager
            asset_ext: .tar.gz

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux headless build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"
          python -m pip install pyinstaller

      - name: Propagate version into Info.plist (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SCANNER_MANAGER_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Build with PyInstaller
        run: pyinstaller packaging/scanner-manager.spec --noconfirm

      - name: Show dist tree (debug)
        shell: bash
        run: ls -la dist

      - name: Package artifact (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist/ScannerManager.exe).Hash.ToLower()
          "$hash  ScannerManager.exe" | Out-File -Encoding ascii dist/ScannerManager.exe.sha256
          Compress-Archive -Path dist/ScannerManager.exe -DestinationPath dist/${{ matrix.artifact_name }}.zip -Force
          $ziphash = (Get-FileHash -Algorithm SHA256 dist/${{ matrix.artifact_name }}.zip).Hash.ToLower()
          "$ziphash  ${{ matrix.artifact_name }}.zip" | Out-File -Encoding ascii dist/${{ matrix.artifact_name }}.zip.sha256

      - name: Package artifact (macOS tarball)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ matrix.artifact_name }}.tar.gz" ScannerManager.app
          shasum -a 256 "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Package artifact (Linux tarball)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          chmod +x ScannerManager
          tar -czf "${{ matrix.artifact_name }}.tar.gz" ScannerManager
          sha256sum "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}*

  publish-release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source + wheel distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-windows-x64
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-macos
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-linux-x64
          path: dist

      - name: List release payload
        run: ls -la dist

      - name: Extract release notes
        id: notes
        run: |
          python - <<'PY'
          import os, re
          tag = os.environ.get("GITHUB_REF_NAME", "")
          version = tag.lstrip("v")
          body = "See CHANGELOG.md for details.\n"
          try:
              with open("CHANGELOG.md", "r", encoding="utf-8") as f:
                  changelog = f.read()
              # Match the version header (e.g. "## [0.9.0a1] - 2026-04-19")
              # allowing optional date and bracket variants.
              pat = re.compile(
                  rf"^##\s*\[?{re.escape(version)}\]?.*?$(.*?)(?=^##\s*\[|\Z)",
                  re.MULTILINE | re.DOTALL,
              )
              m = pat.search(changelog)
              if m:
                  body = m.group(1).strip() + "\n"
          except OSError:
              pass
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version={version}\n")
              out.write("body<<EOF\n")
              out.write(body)
              out.write("\nEOF\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Scanner Manager ${{ steps.notes.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') }}
          files: |
            dist/ScannerManager-windows-x64.zip
            dist/ScannerManager-windows-x64.zip.sha256
            dist/ScannerManager-macos.tar.gz
            dist/ScannerManager-macos.tar.gz.sha256
            dist/ScannerManager-linux-x64.tar.gz
            dist/ScannerManager-linux-x64.tar.gz.sha256
            dist/*.tar.gz
            dist/*.whl
