# Release build (deprecated mirror)
#
# GitLab (.gitlab-ci.yml) is the primary release path. Run this workflow
# manually only when mirroring a GitLab-validated tag to the public GitHub repo.

name: Release build (deprecated mirror)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or branch, e.g. v0.10.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  SCANNER_MANAGER_BUILD_TYPE: Release

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_root: build/Windows/Release
            artifact_name: ScannerManager-windows-x64
            asset_ext: .zip
          - os: macos-latest
            build_root: build/macOS/Release
            artifact_name: ScannerManager-macos
            asset_ext: .tar.gz
          - os: ubuntu-latest
            build_root: build/Linux/Release
            artifact_name: ScannerManager-linux-x64
            asset_ext: .tar.gz

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux headless build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Set release version
        shell: bash
        run: |
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION#v}"
          echo "SCANNER_MANAGER_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Build release artifacts
        run: python scripts/build_release.py --type Release --smoke --skip-sync

      - name: Show build tree (debug)
        shell: bash
        run: ls -la "${{ matrix.build_root }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.build_root }}/${{ matrix.artifact_name }}*

  publish-release:
    name: Publish GitHub Release (manual mirror)
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source + wheel distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-windows-x64
          path: release-artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-macos
          path: release-artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ScannerManager-linux-x64
          path: release-artifacts

      - name: List release payload
        run: ls -la release-artifacts dist

      - name: Extract release notes
        id: notes
        run: |
          python - <<'PY'
          import os, re
          tag = "${{ inputs.ref }}"
          version = tag.lstrip("v")
          body = "See CHANGELOG.md for details.\n"
          try:
              with open("CHANGELOG.md", "r", encoding="utf-8") as f:
                  changelog = f.read()
              pat = re.compile(
                  rf"^##\s*\[?{re.escape(version)}\]?.*?$(.*?)(?=^##\s*\[|\Z)",
                  re.MULTILINE | re.DOTALL,
              )
              m = pat.search(changelog)
              if m:
                  body = m.group(1).strip() + "\n"
          except OSError:
              pass
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version={version}\n")
              out.write("body<<EOF\n")
              out.write(body)
              out.write("\nEOF\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref }}
          name: "Scanner Manager ${{ steps.notes.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(inputs.ref, 'alpha') || contains(inputs.ref, 'beta') || contains(inputs.ref, 'rc') || contains(inputs.ref, 'a') || contains(inputs.ref, 'b') }}
          files: |
            release-artifacts/ScannerManager-windows-x64.zip
            release-artifacts/ScannerManager-windows-x64.zip.sha256
            release-artifacts/ScannerManager-macos.tar.gz
            release-artifacts/ScannerManager-macos.tar.gz.sha256
            release-artifacts/ScannerManager-linux-x64.tar.gz
            release-artifacts/ScannerManager-linux-x64.tar.gz.sha256
            dist/*.tar.gz
            dist/*.whl
