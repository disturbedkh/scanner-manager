name: CI (GitHub mirror + SonarCloud)

# GitLab (.gitlab-ci.yml) is the primary dev gate. This workflow validates the
# public GitHub mirror and uploads coverage to SonarCloud on main.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Install Linux headless X helpers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk libegl1 libgl1 libglib2.0-0

      - name: Lint (ruff)
        run: >-
          ruff check core/ gui/ legacy_tk/ scanner_profiles/ scanner_drivers/
          firmware/ streaming/ audio/ virtual_sd/ tests/ scripts/ Metacache/Dev/RE/tools/

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Smoke-test imports
        shell: bash
        run: |
          python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
          python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"

  coverage:
    name: Coverage (main)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Install headless X helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk libegl1 libgl1 libglib2.0-0

      - name: Run Qt tests (headless)
        shell: bash
        run: |
          set -o pipefail
          set +e
          xvfb-run -a pytest -m qt -q 2>&1 | tee qt.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            if grep -qE '[0-9]+ passed' qt.log && ! grep -qE '(^FAILED|^ERROR| failed)' qt.log; then
              if [ "$code" -eq 139 ] || [ "$code" -eq 134 ]; then
                echo "Ignoring Qt teardown exit $code (all tests passed)"
                exit 0
              fi
            fi
          fi
          exit "$code"

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          set +e
          xvfb-run -a pytest -m "not requires_serial and not slow" \
            --cov --cov-report=xml:coverage.xml --cov-fail-under=88 -q 2>&1 | tee cov.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ] && [ -f coverage.xml ]; then
            if grep -qE '[0-9]+ passed' cov.log && ! grep -qE '(^FAILED|^ERROR| failed)' cov.log; then
              if [ "$code" -eq 139 ] || [ "$code" -eq 134 ]; then
                echo "Ignoring Qt teardown exit $code (coverage.xml present, tests passed)"
                exit 0
              fi
            fi
          fi
          exit "$code"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  sonarcloud:
    name: SonarCloud (main)
    needs: coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Disable SonarCloud Automatic Analysis (CI scanner prerequisite)
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: bash ./scripts/sonarcloud_disable_autoscan.sh

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=disturbedkh
            -Dsonar.projectKey=disturbedkh_scanner-manager
            -Dsonar.python.version=3.12
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Check Cloud quality gate
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONARCLOUD_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./scripts/check_quality_gate.ps1 -Cloud -MaxOpenIssues 0 -OpenIssuesOnly
