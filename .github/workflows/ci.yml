name: CI (secondary mirror)

# GitLab (.gitlab-ci.yml) is the primary CI gate. Run this workflow
# manually when validating the public GitHub mirror.

on:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.9"

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Install Linux headless X helpers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk

      - name: Lint (ruff)
        run: >-
          ruff check core/ gui/ legacy_tk/ scanner_profiles/ scanner_drivers/
          firmware/ streaming/ audio/ virtual_sd/ tests/ scripts/ Metacache/Dev/RE/tools/

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest -x --maxfail=3

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: pytest -x --maxfail=3

      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest -x --maxfail=3

      - name: Smoke-test imports
        shell: bash
        run: |
          python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
          python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"
