name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
        exclude:
          # macOS 14+ runners dropped Python 3.9 wheels for tkinter.
          # Only test 3.11 / 3.12 on macOS to keep the job matrix lean
          # and avoid a flaky setup-python lookup.
          - os: macos-latest
            python-version: "3.9"

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Install Linux headless X helpers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tk

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest -x --maxfail=3

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: pytest -x --maxfail=3

      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest -x --maxfail=3

      - name: Smoke-test module import
        shell: bash
        run: |
          python -c "import scanner_manager; print('import ok:', scanner_manager.APP_VERSION)"
          python -c "import sdcard, metastore, uniden_tools, rr_api; print('all modules import cleanly')"
