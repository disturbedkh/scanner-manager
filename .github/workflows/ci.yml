name: CI (GitHub mirror + SonarCloud)

# GitLab (.gitlab-ci.yml) is the primary dev gate. This workflow validates the
# public GitHub mirror and uploads coverage to SonarCloud on main.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Install Linux headless X helpers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk libegl1 libgl1 libglib2.0-0

      - name: Lint (ruff)
        run: >-
          ruff check core/ gui/ legacy_tk/ scanner_profiles/ scanner_drivers/
          firmware/ streaming/ audio/ virtual_sd/ tests/ scripts/ Metacache/Dev/RE/tools/

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest -m "not requires_serial and not slow and not qt" -x --maxfail=3

      - name: Smoke-test imports
        shell: bash
        run: |
          python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
          python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"

  sonarcloud:
    name: SonarCloud (main)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      QT_QPA_PLATFORM: offscreen
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"

      - name: Install headless X helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk libegl1 libgl1 libglib2.0-0

      - name: Run tests with coverage
        run: xvfb-run -a pytest -m "not requires_serial and not slow" --cov --cov-report=xml:coverage.xml --cov-fail-under=88 -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=disturbedkh
            -Dsonar.projectKey=disturbedkh_scanner-manager
            -Dsonar.python.version=3.12
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

      - name: Check Cloud quality gate
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONARCLOUD_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./scripts/check_quality_gate.ps1 -Cloud -MaxOpenIssues 0
