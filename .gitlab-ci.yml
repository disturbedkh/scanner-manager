# GitLab CI — primary gate for scanner-manager (private mirror).
# Install path matches local dev: pip install -e ".[full,dev]"

stages:
  - lint
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.default_before:
  before_script:
    - python -m pip install -U pip
    - python -m pip install -e ".[full,dev]"

lint:
  stage: lint
  image: python:3.12
  extends: .default_before
  script:
    - ruff check core/ gui/ legacy_tk/ scanner_profiles/ scanner_drivers/ firmware/ streaming/ audio/ virtual_sd/ tests/ scripts/ AI/Dev/RE/tools/

.test_linux:
  stage: test
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq xvfb python3-tk
    - python -m pip install -U pip
    - python -m pip install -e ".[full,dev]"
  script:
    - xvfb-run -a pytest -q
    - python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
    - python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"

test:linux:3.9:
  extends: .test_linux
  image: python:3.9

test:linux:3.11:
  extends: .test_linux
  image: python:3.11

test:linux:3.12:
  extends: .test_linux
  image: python:3.12

test:windows:3.12:
  stage: test
  tags:
    - saas-windows-medium-amd64
  extends: .default_before
  script:
    - pytest -q
    - python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
    - python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"

test:macos:3.12:
  stage: test
  tags:
    - saas-macos-medium-m1
  extends: .default_before
  script:
    - pytest -q
    - python -c "import gui.app; import core.metastore, core.uniden_tools; print('import ok')"
    - python -c "import legacy_tk.scanner_manager; print('legacy tk ok')"

release:windows:
  stage: release
  tags:
    - saas-windows-medium-amd64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  extends: .default_before
  script:
    - pyinstaller packaging/scanner-manager.spec --noconfirm
    - powershell -Command "$hash = (Get-FileHash -Algorithm SHA256 dist/ScannerManager.exe).Hash.ToLower(); $hash | Out-File -Encoding ascii dist/ScannerManager.exe.sha256; Compress-Archive -Path dist/ScannerManager.exe -DestinationPath dist/ScannerManager-windows-x64.zip -Force; (Get-FileHash -Algorithm SHA256 dist/ScannerManager-windows-x64.zip).Hash.ToLower() | Out-File -Encoding ascii dist/ScannerManager-windows-x64.zip.sha256"
  artifacts:
    paths:
      - dist/ScannerManager.exe
      - dist/ScannerManager.exe.sha256
      - dist/ScannerManager-windows-x64.zip
      - dist/ScannerManager-windows-x64.zip.sha256
    expire_in: 30 days

release:macos:
  stage: release
  tags:
    - saas-macos-medium-m1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  extends: .default_before
  script:
    - export SCANNER_MANAGER_VERSION="${CI_COMMIT_TAG#v}"
    - pyinstaller packaging/scanner-manager.spec --noconfirm
    - cd dist && tar -czf ScannerManager-macos.tar.gz ScannerManager.app
    - cd dist && shasum -a 256 ScannerManager-macos.tar.gz > ScannerManager-macos.tar.gz.sha256
  artifacts:
    paths:
      - dist/ScannerManager.app
      - dist/ScannerManager-macos.tar.gz
      - dist/ScannerManager-macos.tar.gz.sha256
    expire_in: 30 days

release:linux:
  stage: release
  image: python:3.12
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq tk
    - python -m pip install -U pip
    - python -m pip install -e ".[full,dev]"
  script:
    - pyinstaller packaging/scanner-manager.spec --noconfirm
    - cd dist && chmod +x ScannerManager
    - cd dist && tar -czf ScannerManager-linux-x64.tar.gz ScannerManager
    - cd dist && sha256sum ScannerManager-linux-x64.tar.gz > ScannerManager-linux-x64.tar.gz.sha256
  artifacts:
    paths:
      - dist/ScannerManager
      - dist/ScannerManager-linux-x64.tar.gz
      - dist/ScannerManager-linux-x64.tar.gz.sha256
    expire_in: 30 days
