sonar.projectKey=scanner-manager
sonar.projectName=scanner-manager
sonar.organization=disturbedkh
# Cloud project key on SonarCloud: disturbedkh_scanner-manager (VPS key stays scanner-manager).
sonar.sourceEncoding=UTF-8
sonar.branch.name=main

# Full analyzed tree (no path-based issue suppressions)
sonar.sources=core,gui,scanner_profiles,scanner_drivers,firmware,streaming,audio,virtual_sd,legacy_tk,Metacache,scripts,.github
sonar.tests=tests

# Binary/text fixtures under tests/ (e.g. *.firm) are not covered by sonar.exclusions.
sonar.test.exclusions=\
  tests/fixtures/**

sonar.exclusions=\
  dev_mcp/**,\
  vendor/**,\
  build/**,\
  dist/**,\
  **/__pycache__/**,\
  **/*.pdf,\
  **/*.gbf,\
  **/*.msi,\
  **/*.bin,\
  **/*.firm,\
  **/*.pcap,\
  **/*.zip,\
  **/*.exe,\
  **/*.java,\
  **/*.utf16.txt,\
  Metacache/Dev/RE/firmware/SDS100_SUB.rep/**,\
  Metacache/Dev/RE/sentinel_decompile/**,\
  Metacache/Dev/RE/sentinel_decompile/strings/**,\
  .github/workflows/**

# Primary CI interpreter (GitHub sonarcloud job, GitLab test:coverage); was 3.9.
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Bootstrap-only files excluded from coverage metric (still analyzed for issues)
sonar.coverage.exclusions=\
  **/gui/app.py,\
  **/__init__.py
