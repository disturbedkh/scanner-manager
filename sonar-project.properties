sonar.projectKey=scanner-manager
sonar.projectName=scanner-manager
sonar.organization=disturbedkh
# Cloud project key on SonarCloud: disturbedkh_scanner-manager (VPS key stays scanner-manager).
sonar.sourceEncoding=UTF-8
sonar.branch.name=main

# Active product code only (legacy_tk excluded)
sonar.sources=core,gui,scanner_profiles,scanner_drivers,firmware,streaming,audio,virtual_sd
sonar.tests=tests

# Noise / non-product paths
sonar.exclusions=\
  legacy_tk/**,\
  dev_mcp/**,\
  Metacache/**,\
  scripts/**,\
  vendor/**,\
  build/**,\
  dist/**,\
  **/__pycache__/**

sonar.python.version=3.9
sonar.python.coverage.reportPaths=coverage.xml

# Optional: keep UI entry/bootstrap files from dragging gate
sonar.coverage.exclusions=\
  **/gui/app.py,\
  **/__init__.py,\
  **/core/__init__.py,\
  **/gui/__init__.py,\
  **/scanner_profiles/__init__.py,\
  **/scanner_drivers/__init__.py,\
  **/firmware/__init__.py,\
  **/streaming/__init__.py,\
  **/audio/__init__.py,\
  **/virtual_sd/__init__.py,\
  **/core/hpd.py,\
  **/core/appinfo.py

# Suppress test-only style noise (VPS gate ignores these; Cloud auto-scan does not)
sonar.issue.ignore.multicriteria=t1,t2,t3,t4
sonar.issue.ignore.multicriteria.t1.ruleKey=python:S1186
sonar.issue.ignore.multicriteria.t1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t2.ruleKey=python:S100
sonar.issue.ignore.multicriteria.t2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t3.ruleKey=python:S116
sonar.issue.ignore.multicriteria.t3.resourceKey=tests/**
# requirements.lock is pip-tools universal lock (not uv/poetry); suppress false positive
sonar.issue.ignore.multicriteria.t4.ruleKey=text:S8565
sonar.issue.ignore.multicriteria.t4.resourceKey=pyproject.toml