# VPS scanner profile (Option A): product tree only, no tests.
# Loaded via -Dproject.settings=sonar-project.vps.properties (replaces sonar-project.properties).

sonar.projectKey=scanner-manager
sonar.projectName=scanner-manager
sonar.sourceEncoding=UTF-8
sonar.branch.name=main

sonar.sources=core,gui,scanner_profiles,scanner_drivers,firmware,streaming,audio,virtual_sd,legacy_tk,Metacache,scripts,.github
sonar.tests=

sonar.exclusions=\
  dev_mcp/**,\
  vendor/**,\
  build/**,\
  dist/**,\
  **/__pycache__/**,\
  **/*.pdf,\
  **/*.gbf,\
  **/*.msi,\
  **/*.bin,\
  **/*.firm,\
  **/*.pcap,\
  **/*.zip,\
  **/*.exe,\
  **/*.java,\
  **/*.utf16.txt,\
  Metacache/Dev/RE/firmware/SDS100_SUB.rep/**,\
  Metacache/Dev/RE/sentinel_decompile/**,\
  Metacache/Dev/RE/sentinel_decompile/strings/**,\
  .github/workflows/**,\
  tests/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

sonar.coverage.exclusions=\
  **/gui/app.py,\
  **/__init__.py,\
  legacy_tk/**,\
  Metacache/**,\
  scripts/**,\
  .github/**
